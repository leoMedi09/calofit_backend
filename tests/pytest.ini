[pytest]
minversion = 7.0
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider
    -m "not external"

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (servicios aislados)
    integration: Integration tests (servicios + BD)
    e2e: End-to-end tests (API endpoints)
    adversarial: Adversarial test cases
    slow: Slow running tests
    external: Depende de Groq real - excluido por defecto, correr con "pytest tests/external/ -v" o "-m external"
